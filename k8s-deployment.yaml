---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: snitch
  namespace: monitoring

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: snitch
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: snitch
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: snitch
subjects:
- kind: ServiceAccount
  name: snitch
  namespace: monitoring

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: snitch-db
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: gp2

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: snitch
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snitch
  template:
    metadata:
      labels:
        app: snitch
    spec:
      serviceAccountName: snitch
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: snitch
        image: snitch:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: SLACK_WEBHOOK_URL
          valueFrom:
            secretKeyRef:
              name: snitch-secrets
              key: slack-webhook-url
        volumeMounts:
        - name: db
          mountPath: /var/lib/snitch
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "test -f /var/lib/snitch/snitch_events.db"
          initialDelaySeconds: 30
          periodSeconds: 60
      volumes:
      - name: db
        persistentVolumeClaim:
          claimName: snitch-db

---
apiVersion: v1
kind: Secret
metadata:
  name: snitch-secrets
  namespace: monitoring
type: Opaque
stringData:
  slack-webhook-url: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
